<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duo-PS Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        header {
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 60px;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            width: 250px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .value {
            font-size: 40px;
            margin-top: 15px;
            font-weight: bold;
        }

        footer {
            text-align: center;
            margin-top: 80px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<header>
    Duo-PS Server Dashboard
</header>

<div class="container">
    <div class="card">
        <h2>👥 Players Online</h2>
        <div class="value" id="players">Loading...</div>
    </div>

    <div class="card">
        <h2>🖥 CPU Usage</h2>
        <div class="value" id="cpu">Loading...</div>
    </div>
</div>

<footer>
    API Public Port: 3835
</footer>

<script>
    async function loadServerData() {
        try {
            const response = await fetch("http://localhost:3835/api/status");
            const data = await response.json();

            document.getElementById("players").textContent = data.players + " Player";
            document.getElementById("cpu").textContent = data.cpu + "%";
        } catch (error) {
            document.getElementById("players").textContent = "Offline";
            document.getElementById("cpu").textContent = "Offline";
            console.error("Gagal mengambil data:", error);
        }
    }

    loadServerData();
    setInterval(loadServerData, 5000); // Refresh setiap 5 detik
</script>

</body>
  </html>
